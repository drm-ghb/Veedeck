  <circle cx="50" cy="45" r="5" fill="#19213D"/>
  <line x1="50" y1="50" x2="50" y2="56" stroke="#19213D" strokeWidth="2.5" strokeLinecap="round"/>

  <!-- Arrow 2→3 -->
  <path d="M65 50 L71 50" stroke="#FFFFFF" strokeWidth="4" strokeLinecap="round"/>
  <path d="M67 44 L73 50 L67 56" stroke="#FFFFFF" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>

  <!-- Node 3: approved (faded white, checkmark) -->
  <circle cx="84" cy="50" r="11" fill="#FFFFFF" opacity="0.3"/>
  <path d="M79 50 L83 54 L91 43" stroke="#FFFFFF" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none" opacity="0.6"/>
</svg>
