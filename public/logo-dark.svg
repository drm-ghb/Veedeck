<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Node 1: input render (faded white circle) -->
  <circle cx="16" cy="50" r="11" fill="#FFFFFF" opacity="0.3"/>

  <!-- Arrow 1→2 -->
  <path d="M29 50 L35 50" stroke="#FFFFFF" strokeWidth="4" strokeLinecap="round"/>
  <path d="M31 44 L37 50 L31 56" stroke="#FFFFFF" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>

  <!-- Node 2: review stage (main white, dark pin inside) -->
