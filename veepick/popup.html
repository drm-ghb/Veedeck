<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veepick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px; width: 340px; background: #fff; color: #111;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .header { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid #f0f0f0; }
    .header img { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
    .header .settings-btn { background: none; border: none; cursor: pointer; color: #999; padding: 4px; border-radius: 4px; }
    .header .settings-btn:hover { color: #333; background: #f4f4f4; }

    .screen { padding: 14px; }
    .hidden { display: none !important; }

    /* Setup screen */
    .setup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .setup-desc { color: #666; font-size: 12px; line-height: 1.5; margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
      background: #fafafa; color: #111;
    }
    input:focus, select:focus, textarea:focus { border-color: #6366f1; background: #fff; }
    .field { margin-bottom: 10px; }
    textarea { resize: vertical; min-height: 52px; }

    /* Button */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 9px 14px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .btn-outline { background: #fff; color: #333; border: 1px solid #e0e0e0; }
    .btn-outline:hover:not(:disabled) { background: #f5f5f5; }
    .btn-sm { font-size: 12px; padding: 6px 10px; width: auto; }

    /* Product preview */
    .product-preview { display: flex; gap: 10px; align-items: flex-start; padding: 10px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; margin-bottom: 6px; }
    .product-preview img { width: 56px; height: 56px; object-fit: contain; border-radius: 6px; border: 1px solid #eee; background: #fff; flex-shrink: 0; }
    .product-preview .img-placeholder { width: 56px; height: 56px; border-radius: 6px; border: 1px solid #eee; background: #f0f0f0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 20px; }
    .product-preview .info { flex: 1; min-width: 0; }
    .product-preview .pname { font-weight: 600; font-size: 13px; line-height: 1.3; word-break: break-word; margin-bottom: 2px; }
    .product-preview .pdetail { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-preview .pprice { font-size: 13px; font-weight: 700; color: #333; margin-top: 2px; }

    .divider { height: 1px; background: #f0f0f0; margin: 10px 0; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Status */
    .status { margin-top: 10px; padding: 8px 10px; border-radius: 6px; font-size: 12px; text-align: center; }
    .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .link { color: #6366f1; text-decoration: none; font-size: 12px; }
    .link:hover { text-decoration: underline; }
    .back-btn { background: none; border: none; color: #6366f1; cursor: pointer; font-size: 12px; margin-bottom: 10px; padding: 0; }
    .back-btn:hover { text-decoration: underline; }
    .user-info { font-size: 11px; color: #888; margin-top: 6px; }
    .img-picker-hint { font-size: 10px; color: #aaa; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Veepick" />
    <h1>Veepick</h1>
    <button class="settings-btn hidden" id="settingsBtn" title="Ustawienia">⚙</button>
    <button class="settings-btn" id="btnClose" title="Zamknij">✕</button>
  </div>

  <!-- Setup screen -->
  <div id="screenSetup" class="screen">
    <p class="setup-title">Połącz z veedeck</p>
    <p class="setup-desc">Wklej swój klucz API z ustawień konta w veedeck (Ustawienia → Wtyczka).</p>
    <div class="field">
      <label for="inputBaseUrl">Adres aplikacji</label>
      <input id="inputBaseUrl" type="url" placeholder="np. http://localhost:3000" />
    </div>
    <div class="field">
      <label for="inputApiKey">Klucz API</label>
      <input id="inputApiKey" type="text" placeholder="vp_..." />
    </div>
    <button class="btn btn-primary" id="btnConnect">Połącz</button>
    <div id="setupStatus"></div>
  </div>

  <!-- Settings screen -->
  <div id="screenSettings" class="screen hidden">
    <button class="back-btn" id="btnBackFromSettings">← Wróć</button>
    <div class="field">
      <label for="settingsBaseUrl">Adres aplikacji</label>
      <input id="settingsBaseUrl" type="url" />
    </div>
    <div class="field">
      <label for="settingsApiKey">Klucz API</label>
      <input id="settingsApiKey" type="text" />
    </div>
    <button class="btn btn-primary" id="btnSaveSettings" style="margin-bottom:8px;">Zapisz</button>
    <button class="btn btn-outline" id="btnDisconnect">Rozłącz konto</button>
    <div id="settingsStatus"></div>
  </div>

  <!-- Main screen -->
  <div id="screenMain" class="screen hidden">
    <!-- Product preview -->
    <div class="product-preview" id="productPreview">
      <div class="img-placeholder" id="previewImgPlaceholder">🛍</div>
      <img id="previewImg" class="hidden" alt="" />
      <div class="info">
        <div class="pname" id="previewName">Ładowanie...</div>
        <div class="pdetail" id="previewSupplier"></div>
        <div class="pprice" id="previewPrice"></div>
      </div>
    </div>

    <p class="img-picker-hint" id="imagePickerHint">Najedź na zdjęcie na stronie aby wybrać inne</p>

    <!-- List + section -->
    <div class="field">
      <label for="selectList">Lista zakupowa</label>
      <select id="selectList"><option value="">Wybierz listę...</option></select>
    </div>
    <div class="field">
      <label for="selectSection">Sekcja</label>
      <select id="selectSection" disabled><option value="">Wybierz sekcję...</option></select>
    </div>

    <div class="divider"></div>

    <!-- Editable fields -->
    <div class="field">
      <label for="fieldName">Nazwa *</label>
      <input id="fieldName" type="text" placeholder="Nazwa produktu" />
    </div>
    <div class="row2">
      <div class="field">
        <label for="fieldPrice">Cena</label>
        <input id="fieldPrice" type="text" placeholder="np. 299 PLN" />
      </div>
      <div class="field">
        <label for="fieldQty">Ilość</label>
        <input id="fieldQty" type="number" min="1" value="1" />
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="fieldManufacturer">Producent</label>
        <input id="fieldManufacturer" type="text" placeholder="np. Sklum" />
      </div>
      <div class="field">
        <label for="fieldColor">Kolor</label>
        <input id="fieldColor" type="text" placeholder="np. Biały" />
      </div>
    </div>
    <div class="field">
      <label for="fieldDimensions">Wymiar</label>
      <input id="fieldDimensions" type="text" placeholder="np. 60x80 cm" />
    </div>
    <div class="field">
      <label for="fieldNote">Notatka</label>
      <textarea id="fieldNote" placeholder="Dodatkowe uwagi dla klienta..."></textarea>
    </div>

    <div id="duplicateWarning" class="status error hidden"></div>
    <button class="btn btn-primary" id="btnAdd" disabled>
      Dodaj do listy
    </button>
    <div id="mainStatus"></div>
    <div class="user-info" id="userInfo"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
